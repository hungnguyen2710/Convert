version: '3.8'

services:
  app:
    build: ./docker/php
    container_name: convert_app
    restart: always
    volumes:
      - ./src:/var/www
    working_dir: /var/www
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:latest
    container_name: convert_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"   # 👈 thêm HTTPS
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro   # 👈 mount SSL
    depends_on:
      - app

  mysql:
    image: mysql:8
    container_name: convert_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:alpine
    container_name: convert_redis
    restart: always

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: convert_phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root

volumes:
  db_data: